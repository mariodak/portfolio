<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mario Dak - Portfolio</title>

    <style>
        #preloader {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .loader-square {
            width: 25px; height: 25px;
            background: #ffff00;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loader-hidden { opacity: 0; pointer-events: none; transition: 0.5s; }
    </style>

    <link rel="stylesheet" href="assets/css/styles.css" />
    
    <script src="/assets/scripts/main.js" defer></script>
    <script src="/assets/scripts/vanilla.js" defer></script>
</head>

<body>
    <div id="preloader">
        <div class="loader-square"></div>
    </div>

    <div class="page-wrapper">
        <div class="mytitle" data-text="MARIO DAK">
            <h1>Mario Dak</h1>
        </div>

        <div class="portfolio-frame">
            <div class="inner-mask"></div> 
            <div class="content-inside">
                <header>
                    <nav>
                        <a href="#" onclick="navigate('home.html'); return false;">Home</a>
                        <a href="#" onclick="navigate('artstyle.html'); return false;">Art Style</a>
                        <a href="#" onclick="navigate('projects.html'); return false;">Projects</a>
                        <a href="#" onclick="navigate('gallery.html'); return false;">Gallery</a>
                        <a href="#" onclick="navigate('contact.html'); return false;">Contact</a>
                    </nav>
                </header>

                <section id="main-section">
                    <div style="color: #ffff00; text-align: center; padding-top: 50px;">
                        SYSTEM INITIALIZING...
                    </div>
                </section>
            </div>
        </div>
    </div>

    <footer>@ Copyright Mario Dak 2026</footer>

    <script>
        function navigate(file) {
            const area = document.getElementById('main-section');
            area.style.opacity = '0.5'; 

            fetch(file)
                .then(response => response.text())
                .then(html => {
                    area.innerHTML = html;
                    area.style.opacity = '1';
                })
                .catch(err => {
                    area.innerHTML = "<h1>ERROR 404</h1>";
                });
        }

        // TOTO JE KĽÚČ: Vypneme loader až keď prebehne window.load
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            
            // Spustíme prvú navigáciu hneď
            navigate('home.html');

            // Necháme štvorec točiť sa aspoň o 300ms dlhšie, aby to Safari stihlo vykresliť
            setTimeout(() => {
                preloader.classList.add('loader-hidden');
                setTimeout(() => { preloader.style.display = 'none'; }, 500);
            }, 300); 
        });
    </script>
    <script>
      // 1. Loader spustíme okamžite pri načítaní tohto skriptu
const preloader = document.getElementById('preloader');

// 2. Funkcia na navigáciu (tú už máš, len ju uisti, že je dostupná)
function navigate(file) {
    const area = document.getElementById('main-section');
    fetch(file)
        .then(response => response.text())
        .then(html => {
            area.innerHTML = html;
            // Tu môžeš pridať ďalšiu logiku po načítaní
        });
}

// 3. TENTO TRIK ODRUBE SAFARI:
// Namiesto čakania na 'load' (ktorý trvá večnosť alebo nulu), 
// nastavíme fixný čas, aby mal používateľ zážitok z "bootovania" systému.

function startSystem() {
    // Spustíme fetch domovskej stránky na pozadí
    navigate('home.html');

    // Umelo podržíme loader 1.5 sekundy (Cyberpunk boot-up time)
    setTimeout(() => {
        preloader.classList.add('loader-hidden');
        
        setTimeout(() => {
            preloader.style.display = 'none';
        }, 500); // čas na fade-out
    }, 1500); 
}

// Spustíme celú parádu
startSystem();
    </script>
</body>
</html>
