<!doctype html>
<html lang="sk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mario Dak - Portfolio</title>
    
    <link rel="stylesheet" href="assets/css/styles.css" />

    <style>
    </style>
</head>
<body>

    <div id="main-content">
        <div class="page-wrapper">
            
            <div class="mytitle">MARIO DAK</div>

<div id="site-loader">
    <div class="loader-row">
        <span class="status-icon">[LOADING ENGINE]</span> 
        <span id="terminal-output">INITIALIZING...</span>
        <span id="loader-percentage">0%</span>
    </div>
</div>

            <div class="portfolio-frame">
                <div class="inner-mask"></div> 
                
                <div class="content-inside">
                        <header>
                            <nav class="portfolio-nav">
                        <div class="active-indicator-mobile">
                          <a href="#" class="active-link" data-text="HOME">HOME</a>
                      </div>

                     <div class="nav-links-container" id="main-nav-links">
             <a href="#" data-text="Home" class="active-link" data-file="home.html">Home</a>
             <a href="#" data-text="Art Style" onclick="navigate('artstyle.html', this); return false;">Art Style</a>
             <a href="#" data-text="Projects" onclick="navigate('projects.html', this); return false;">Projects</a>
             <a href="#" data-text="Gallery" onclick="navigate('gallery.html', this); return false;">Gallery</a>
             <a href="#" data-text="Contact" onclick="navigate('contact.html', this); return false;">Contact</a>
         </div>

            <div class="hamburger-menu" id="mobile-toggle">
            <span></span>
            <span></span>
            <span></span>
         </div>
     </nav>
     </header>

                    <section id="main-section">
                        </section>
                </div>
            </div>
        </div>

        <footer>
            @ Copyright Mario Dak 2026
        </footer>
    </div>

    <script>
        // Funkcia na prepínanie podstránok
        function navigate(file) {
            const area = document.getElementById('main-section');
            if (!area) return;

            area.style.opacity = '0'; //

            setTimeout(() => {
                fetch(file)
                    .then(response => {
                        if (!response.ok) throw new Error('Súbor nenájdený');
                        return response.text();
                    })
                    .then(html => {
                        area.innerHTML = html;
                        area.style.opacity = '1';
                        
                    })
                    .catch(err => {
                        area.innerHTML = "<h2 style='text-align:center; color:#ffff00;'>SYSTEM_ERROR: DATA_LOST</h2>";
                        area.style.opacity = '1';
                        console.error(err);
                    });
            }, 200);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const mainContent = document.getElementById('main-content');
            
            mainContent.classList.add('fade-in-active');
            
            navigate('home.html');
        });
    </script>

    <script src="assets/scripts/main.js" defer></script>
    <script src="assets/scripts/vanilla.js" defer></script>

</body>
</html>
