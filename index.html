<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mario Dak - Portfolio</title>

    <style>
        #preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000; /* Musí byť nad všetkým */
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        .loader-square {
            width: 25px;
            height: 25px;
            background: #ffff00;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.5);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        .loader-hidden {
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>

    
    
    <script src="/assets/scripts/main.js" defer></script>
    <script src="/assets/scripts/vanilla.js" defer></script>
</head>

<body>
    <div id="preloader">
        <div class="loader-square"></div>
    </div>

    <div class="page-wrapper">
        <div class="mytitle" data-text="MARIO DAK">
            <h1>Mario Dak</h1>
        </div>

        <div class="portfolio-frame">
            <div class="inner-mask"></div> 
            <div class="content-inside">
                <header>
                    <nav>
                        <a href="#" onclick="navigate('home.html'); return false;">Home</a>
                        <a href="#" onclick="navigate('artstyle.html'); return false;">Art Style</a>
                        <a href="#" onclick="navigate('projects.html'); return false;">Projects</a>
                        <a href="#" onclick="navigate('gallery.html'); return false;">Gallery</a>
                        <a href="#" onclick="navigate('contact.html'); return false;">Contact</a>
                    </nav>
                </header>

                <section id="main-section">
                    <div style="color: #ffff00; text-align: center; padding-top: 50px; font-family: monospace;">
                        INITIALIZING SYSTEM...
                    </div>
                </section>
            </div>
        </div>
    </div>

    <footer>
        @ Copyright Mario Dak 2026
    </footer>

    <script>
        const preloader = document.getElementById('preloader');
        const mainSection = document.getElementById('main-section');

        // Funkcia na načítanie podstránok
        function navigate(file) {
            mainSection.style.opacity = '0.4'; 
            
            fetch(file)
                .then(response => {
                    if (!response.ok) throw new Error('Not found');
                    return response.text();
                })
                .then(html => {
                    mainSection.innerHTML = html;
                    mainSection.style.opacity = '1';
                })
                .catch(err => {
                    mainSection.innerHTML = "<h2 style='color:#f00; text-align:center;'>ERROR: DATA_CORRUPTED</h2>";
                    console.error(err);
                });
        }

        // Štartovacia sekvencia
        function bootUp() {
            // Okamžite začneme ťahať domovskú stránku
            navigate('home.html');

            // Safari fix: Aj keď je všetko načítané, loader podržíme aspoň 1.5 sekundy
            // aby mal používateľ vizuálny vnem "načítavania" systému.
            setTimeout(() => {
                preloader.classList.add('loader-hidden');
                
                // Po zmiznutí ho úplne vyhodíme z DOMu, aby nezavadzal
                setTimeout(() => {
                    preloader.style.display = 'none';
                }, 500);
            }, 1500); 
        }

        // Spustíme hneď, ako je tento skript prečítaný
        bootUp();
    </script>
</body>
</html>
