<!doctype html>
<html lang="sk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mario Dak - Portfolio</title>
    
    <link rel="stylesheet" href="assets/css/styles.css" />

    <style>
    </style>
</head>
<body>

    <div id="main-content">
        <div class="page-wrapper">
            
            <div class="mytitle" data-text="MARIO DAK">
                <h1>Mario Dak</h1>
            </div>

            <div class="portfolio-frame">
                <div class="inner-mask"></div> 
                
                <div class="content-inside">
                    <header>
                        <nav>
                            <a href="#" data-text="Home" onclick="navigate('home.html'); return false;">Home</a>
                            <a href="#" data-text="Art Style" onclick="navigate('artstyle.html'); return false;">Art Style</a>
                            <a href="#" data-text="Projects" onclick="navigate('projects.html'); return false;">Projects</a>
                            <a href="#" data-text="Gallery" onclick="navigate('gallery.html'); return false;">Gallery</a>
                            <a href="#" data-text="Contact" onclick="navigate('contact.html'); return false;">Contact</a>
                        </nav>
                    </header>

                    <section id="main-section">
                        </section>
                </div>
            </div>
        </div>

        <footer>
            @ Copyright Mario Dak 2026
        </footer>
    </div>

    <script>
        // Funkcia na prepínanie podstránok
        function navigate(file) {
            const area = document.getElementById('main-section');
            if (!area) return;

            area.style.opacity = '0'; //

            setTimeout(() => {
                fetch(file)
                    .then(response => {
                        if (!response.ok) throw new Error('Súbor nenájdený');
                        return response.text();
                    })
                    .then(html => {
                        area.innerHTML = html;
                        area.style.opacity = '1';
                        
                    })
                    .catch(err => {
                        area.innerHTML = "<h2 style='text-align:center; color:#ffff00;'>SYSTEM_ERROR: DATA_LOST</h2>";
                        area.style.opacity = '1';
                        console.error(err);
                    });
            }, 200);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const mainContent = document.getElementById('main-content');
            
            mainContent.classList.add('fade-in-active');
            
            navigate('home.html');
        });
    </script>

    <script src="assets/scripts/main.js" defer></script>
    <script src="assets/scripts/vanilla.js" defer></script>

</body>
</html>
