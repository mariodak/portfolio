<footer>@ Copyright Mario Dak 2026</footer>

<script>
    window.navigate = function(file) {
        const area = document.getElementById('main-section');
        if (!area) return;

        area.style.opacity = '0.3'; 
        fetch(file)
            .then(response => response.text())
            .then(html => {
                area.innerHTML = html;
                area.style.opacity = '1';
                // Ak tvoj web potrebuje re-inicializovať nejaké efekty po načítaní, daj to sem
            })
            .catch(err => {
                area.innerHTML = "<h1>ERROR: DATA NOT FOUND</h1>";
            });
    };
</script>
